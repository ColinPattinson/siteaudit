<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service assessment prototype</title>
  <style>
    :root {
      --bg: #f3f2f1;
      --panel: #ffffff;
      --text: #0b0c0c;
      --muted: #505a5f;
      --border: #d8dce0;
      --blue: #1d70b8;
      --green: #00703c;
      --amber: #b58800;
      --red: #d4351c;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(180deg, #f6f7f9 0%, var(--bg) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    .container { max-width: 1120px; margin: 0 auto; }
    .hero {
      background: linear-gradient(135deg, #0b4f8a 0%, #1d70b8 60%, #2b8cc4 100%);
      color: #fff;
      padding: 28px 28px 26px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero h1 { margin: 0 0 8px; font-size: 2rem; line-height: 1.15; }
    .hero p { margin: 0; max-width: 70ch; color: rgba(255,255,255,0.92); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 18px;
    }
    form { margin-top: 10px; }
    label { display: block; font-weight: 700; margin-bottom: 8px; }
    .field-row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    .input-wrap { flex: 1 1 420px; min-width: 240px; }
    input[type="url"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #b1b4b6;
      border-radius: 12px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input[type="url"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29,112,184,0.2);
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      padding: 14px 18px;
      min-width: 160px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 2px 0 rgba(0,0,0,0.08);
    }
    button[disabled] { opacity: 0.7; cursor: not-allowed; }

    .action-slot {
      min-width: 320px;
      flex: 0 1 380px;
    }
    .running-state {
      display: none;
      align-items: center;
      gap: 14px;
      min-height: 54px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #edf6ef;
      border: 1px solid #bfd8c5;
    }
    .running-state.active { display: flex; }
    .running-copy { display: grid; gap: 2px; }
    .running-title {
      font-weight: 800;
      color: #124a28;
    }
    .running-text {
      color: #46604f;
      font-size: 0.95rem;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #c8dbcd;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      margin-left: 2px;
      color: var(--muted);
      font-weight: 600;
      display: block;
      margin-top: 12px;
      min-height: 24px;
    }

    .error {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      background: #fce8e6;
      border-left: 5px solid var(--red);
      color: #942514;
      border-radius: 10px;
      font-weight: 600;
    }
    #results { display: none; }
    .results-head {
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 18px;
    }
    @media (max-width: 900px) {
      .results-head { grid-template-columns: 1fr; }
      .action-slot { min-width: 100%; flex-basis: 100%; }
    }

    .score-card {
      background: linear-gradient(135deg, #0b4f8a 0%, #1d70b8 100%);
      color: #fff;
      padding: 22px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .score-card h2 { margin: 0 0 10px; font-size: 1.35rem; }
    .overall-score {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .overall-score strong { font-size: 3rem; line-height: 1; }
    .overall-score span { font-size: 1rem; opacity: 0.95; }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .badge.green { background: var(--green); }
    .badge.amber { background: var(--amber); }
    .badge.red { background: var(--red); }
    .badge.grey { background: #505a5f; }

    .side-card,
    .section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .side-card h3,
    .section h2 { margin-top: 0; }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .muted-box {
      background: #f8f9fb;
      border: 1px solid #e6e8ec;
      padding: 14px 16px;
      border-radius: 12px;
      color: var(--text);
    }

    .framing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 800px) {
      .framing-grid { grid-template-columns: 1fr; }
    }

    .framing-card {
      border: 1px solid #e6e8ec;
      border-radius: 12px;
      background: #fbfcfd;
      padding: 16px;
    }
    .framing-card h3 { margin-top: 0; }

    .mini-list { margin: 8px 0 0; padding-left: 18px; }

    .screenshot-wrap {
      border: 1px solid #e6e8ec;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      min-height: 220px;
    }
    .screenshot-wrap img {
      width: 100%;
      display: block;
      height: auto;
      background: #fff;
    }
    .screenshot-fallback { padding: 14px 16px; }

    .ss-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
    }
    .ss-table th, .ss-table td {
      border-top: 1px solid #e6e8ec;
      padding: 14px 12px;
      vertical-align: top;
      text-align: left;
    }
    .ss-table thead th {
      background: #f8f9fb;
      border-top: 0;
      font-size: 0.95rem;
      font-weight: 700;
    }
    .ss-point { font-weight: 800; color: var(--text); }

    .score-pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef3f8;
      color: var(--text);
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .score-pill.green { background: rgba(0,112,60,0.12); color: var(--green); }
    .score-pill.amber { background: rgba(181,136,0,0.14); color: #7a5b00; }
    .score-pill.red { background: rgba(212,53,28,0.12); color: var(--red); }

    .stack { display: grid; gap: 10px; }
    .item-card {
      border: 1px solid #e6e8ec;
      border-radius: 12px;
      padding: 14px 16px;
      background: #fff;
    }
    .item-card h4 { margin: 0 0 8px; font-size: 1rem; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; }
    }

    .subtle-label {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .empty {
      color: var(--muted);
      background: #fbfbfb;
      border: 1px dashed #d9dde2;
      padding: 12px 14px;
      border-radius: 12px;
    }
    .small { font-size: 0.95rem; }
    .not-assessed {
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="container">
